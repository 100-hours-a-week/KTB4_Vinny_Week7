<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>댓글 삭제 확인 | 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/common.css" />
</head>
<body>
  <div class="modal-backdrop">
    <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="comment-delete-title">
      <h1 id="comment-delete-title" class="dialog__title">댓글을 삭제하시겠습니까?</h1>
      <p class="dialog__text">삭제한 내용은 복구 할 수 없습니다.</p>
      <div class="dialog__actions">
        <button class="btn btn--dark" type="button">취소</button>
        <button class="btn btn--primary" type="button">확인</button>
      </div>
    </section>
  </div>
</body>
</html>
