<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 | 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="site-header__inner">
        <div></div>
        <a class="site-header__title" href="./posts.html">아무 말 대잔치</a>
        <div></div>
      </div>
    </header>

    <main class="main">
      <section class="auth-form" aria-labelledby="login-title">
        <h1 id="login-title" class="section-title">로그인</h1>
        <form class="form">
          <div class="form-group">
            <label class="label" for="email">이메일</label>
            <input class="input" id="email" type="email" placeholder="이메일을 입력하세요" />
            <p class="helper">* 이메일을 입력해주세요.</p>
            <p class="helper">* 올바른 이메일 주소 형식을 입력해주세요.(예: example@adapterz.kr)</p>
          </div>
          <div class="form-group">
            <label class="label" for="password">비밀번호</label>
            <input class="input" id="password" type="password" placeholder="비밀번호를 입력하세요" />
            <p class="helper">* 비밀번호를 입력해주세요</p>
          </div>
          <button class="btn btn--primary btn--wide btn--rounded" type="submit">로그인</button>
        </form>
        <a class="link-button" href="./sign-up.html">회원가입</a>
      </section>
    </main>
  </div>
</body>
</html>
