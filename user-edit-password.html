<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 수정 | 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/user.css" />
</head>

<body>
  <div class="page">
    <header class="site-header">
      <div class="site-header__inner">
        <div></div>
        <a class="site-header__title" href="./posts.html">아무 말 대잔치</a>
        <nav class="profile-menu" aria-label="프로필 메뉴">
          <button class="icon-button" type="button" aria-label="프로필 메뉴 열기"><span class="avatar"></span></button>
          <div class="profile-menu__panel">
            <a class="profile-menu__item" href="./user-edit-profile.html">회원정보수정</a>
            <a class="profile-menu__item" href="./user-edit-password.html">비밀번호수정</a>
            <a class="profile-menu__item" href="./sign-in.html">로그아웃</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="main">
      <section class="form form--narrow" aria-labelledby="password-edit-title">
        <h1 id="password-edit-title" class="section-title">비밀번호 수정</h1>
        <form id="user-edit-password-form" class="form--password-edit" novalidate>
          <div class="form-group">
            <label class="label" for="password">비밀번호</label>
            <input
              class="input"
              id="password"
              type="password"
              autocomplete="new-password"
              placeholder="비밀번호를 입력하세요"
              required />
            <p id="password-helper-text" class="helper"></p>
          </div>
          <div class="form-group">
            <label class="label" for="password-confirm">비밀번호 확인</label>
            <input
              class="input"
              id="password-confirm"
              type="password"
              autocomplete="new-password"
              placeholder="비밀번호를 한번 더 입력하세요"
              required />
            <p id="confirm-password-helper-text" class="helper"></p>
          </div>
          <button
            id="user-edit-password-button"
            class="btn btn--primary btn--wide btn--square"
            type="submit"
            disabled>수정하기</button>
        </form>
      </section>
    </main>
  </div>
  <div
    id="user-edit-password-toast"
    class="toast"
    role="status"
    aria-live="polite">수정완료</div>

  <script src="./js/user-edit-password.js"></script>
</body>
</html>
