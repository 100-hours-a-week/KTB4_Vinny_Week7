<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 작성 | 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/colors.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/post.css">
</head>

<body>
  <div class="page">
    <site-header back-href="./posts.html"></site-header>

    <main class="main main--edit">
      <section class="edit-layout" aria-labelledby="post-write-title">
        <h1 id="post-write-title" class="section-title">게시글 작성</h1>
        <form id="post-write-form" class="form" novalidate>
          <div class="form-group">
            <label class="label required" for="title">제목*</label>
            <hr />
            <input
              class="post__input"
              id="title"
              type="text"
              maxlength="100"
              placeholder="제목을 입력해주세요. (최대 100글자)" />
            <hr />
          </div>
          <div class="form-group">
            <label class="label required" for="content">내용*</label>
            <hr />
            <textarea class="textarea"
              id="content" placeholder="내용을 입력해주세요."></textarea>
            <hr />
            <p id="post-write-helper-text" class="helper"></p>
          </div>
          <div class="form-group">
            <label class="label" for="image">이미지</label>
            <div class="file-input-box">
              <input id="image" type="file" />
            </div>
          </div>
          <button
            id="post-write-button"
            class="btn btn--primary btn--center btn--medium btn--square"
            type="submit"
            disabled>작성하기</button>
        </form>
      </section>
    </main>
  </div>
  <script type="module" src="./js/shared/header.js"></script>
  <script type="module" src="./js/post-write.js"></script>
</body>

</html>
