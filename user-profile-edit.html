<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원정보수정 | 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/user.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="site-header__inner">
        <div></div>
        <a class="site-header__title" href="./posts.html">아무 말 대잔치</a>
        <nav class="profile-menu" aria-label="프로필 메뉴">
          <button class="icon-button" type="button" aria-label="프로필 메뉴 열기"><span class="avatar"></span></button>
          <div class="profile-menu__panel">
            <a class="profile-menu__item" href="./user-profile-edit.html">회원정보수정</a>
            <a class="profile-menu__item" href="./user-password-edit.html">비밀번호수정</a>
            <a class="profile-menu__item" href="./sign-in.html">로그아웃</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="main">
      <section class="user-form" aria-labelledby="user-edit-title">
        <h1 id="user-edit-title" class="section-title">회원정보수정</h1>

        <div class="profile-preview">
          <strong class="profile-preview__label required">프로필 사진 *</strong>
          <input
            id="profile-image-input"
            class="profile-preview__input"
            type="file"
            accept="image/*" />
          <button
            id="profile-preview-image"
            class="profile-preview__image"
            type="button"
            aria-label="프로필 이미지 변경">
            <span class="profile-preview__overlay">변경</span>
          </button>
        </div>

        <form id="user-profile-edit-form" class="form">
          <div class="form-group">
            <span class="label">이메일</span>
            <p id="user-email" class="readonly-text">startupcode@gmail.com</p>
          </div>
          <div class="form-group">
            <label class="label" for="nickname">닉네임</label>
            <input class="input" id="nickname" type="text" placeholder="닉네임을 입력해주세요." />
            <p id="nickname-helper-text" class="helper"></p>
          </div>
          <div class="user-actions">
            <button
              id="user-edit-button"
              class="btn btn--primary btn--square"
              type="submit"
              disabled>수정하기</button>
            <button 
              id="user-delete-button"
              class="btn btn--ghost btn--wide"
              type="button"
              data-dialog-open="user-delete-dialog">회원 탈퇴</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <dialog
    id="user-delete-dialog"
    class="dialog"
    aria-labelledby="user-delete-title">
    <h2 id="user-delete-title" class="dialog__title">회원탈퇴 하시겠습니까?</h2>
    <p class="dialog__text">작성된 게시글과 댓글은 삭제됩니다.</p>
    <div class="dialog__actions">
      <button
        id="user-delete-cancel-button"
        class="btn btn--dark btn--wide btn--rounded"
        type="button">취소</button>
      <button
        id="user-delete-confirm-button"
        class="btn btn--primary btn--wide btn--rounded"
        type="button">확인</button>
    </div>
  </dialog>

  <div
    id="user-edit-toast"
    class="toast"
    role="status"
    aria-live="polite">수정완료</div>

  <script type="module" src="./js/user-profile-edit.js"></script>
</body>
</html>
