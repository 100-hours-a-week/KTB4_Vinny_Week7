<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 수정 | 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/colors.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/post.css">
</head>
<body>
  <div class="page">
    <site-header back-href="./posts.html"></site-header>

    <main class="main main--edit">
      <section class="edit-layout" aria-labelledby="post-edit-title">
        <h1 id="post-edit-title" class="section-title">게시글 수정</h1>
        <form id="post-edit-form" class="form" novalidate>
          <div class="form-group">
            <label class="label required" for="title">제목*</label>
            <hr />
            <input class="post__input" id="title" type="text" maxlength="26" />
            <hr />
          </div>
          <div class="form-group">
            <label class="label required" for="content">내용*</label>
            <hr />
            <textarea class="textarea" id="content"></textarea>
            <hr />
            <p id="post-edit-helper-text" class="helper"></p>
          </div>
          <div class="form-group">
            <label class="label" for="image">이미지</label>
            <div class="file-input-box">
              <input id="image" type="file" accept="image/*" multiple />
            </div>
          </div>
          <button
            id="post-edit-button"
            class="btn btn--primary btn--center btn--medium btn--square"
            type="submit"
            disabled>수정하기</button>
        </form>
      </section>
    </main>
  </div>
  <script type="module" src="./js/shared/header.js"></script>
  <script type="module" src="./js/post-edit.js"></script>
</body>
</html>
