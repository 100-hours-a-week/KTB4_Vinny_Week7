<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 수정 | 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/post.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="icon-button" href="./post-detail.html" aria-label="뒤로가기"><span class="back-icon"></span></a>
        <a class="site-header__title" href="./posts.html">아무 말 대잔치</a>
        <nav class="profile-menu" aria-label="프로필 메뉴">
          <button class="icon-button" type="button" aria-label="프로필 메뉴 열기"><span class="avatar"></span></button>
          <div class="profile-menu__panel">
            <a class="profile-menu__item" href="./user-edit-profile.html">회원정보수정</a>
            <a class="profile-menu__item" href="./user-edit-password.html">비밀번호수정</a>
            <a class="profile-menu__item" href="./sign-in.html">로그아웃</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="main main--edit">
      <section class="edit-layout" aria-labelledby="post-edit-title">
        <h1 id="post-edit-title" class="section-title">게시글 수정</h1>
        <form class="form">
          <div class="form-group">
            <label class="label required" for="title">제목</label>
            <hr/>
            <input class="post__input" id="title" type="text" value="제목 1" />
            <hr/>
          </div>
          <div class="form-group">
            <label class="label required" for="content">내용</label>
            <hr/>
            <textarea class="textarea" id="content">무엇을 얘기해볼까요? 아무말이라면, 삶은 항상 놀라운 모험이라고 생각합니다. 우리는 매일 새로운 경험을 하고 배우며 성장합니다. 때로는 어려움과 도전이 있지만, 그것들이 우리를 더 강하고 지혜롭게 만들어줍니다. 또한 우리는 주변의 사람들과 연결되며 서로를 이해합니다.

자연 속에서는 숲속으로 가서 산책하거나 하늘을 바라보는 아름다움을 느끼곤 합니다. 아니면, 흥미로운 책을 읽거나 새로운 기술을 배우는 것도 즐겁습니다. 다양한 주제의 음악을 듣는 것도 좋아합니다.</textarea>
            <hr/>
            <p class="helper">* helper text</p>
          </div>
          <div class="form-group">
            <label class="label" for="image">이미지</label>
            <div class="file-input-box">
              <input id="image" type="file" />
            </div>
          </div>
          <button class="btn btn--primary btn--center btn--medium btn--square" type="submit">수정하기</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
