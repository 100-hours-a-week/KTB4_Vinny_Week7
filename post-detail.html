<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 상세조회 | 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/colors.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/post.css">
</head>
<body>
  <div class="page">
    <site-header
      back-href="./posts.html"
      title-href="./posts.html"
      show-profile></site-header>

    <main class="main main--detail">
      <article class="detail-layout post-detail">
        <div class="post-detail__head">
          <div>
            <h1 id="post-title" class="post-detail__title"></h1>
            <div class="post-detail__meta">
              <div class="author-line">
                <span id="post-author-avatar" class="tiny-avatar"></span>
                <strong id="post-author-name"></strong>
                <time id="post-created-at"></time>
              </div>
              <div class="post-actions">
                <a id="post-edit-link" class="small-button" href="./post-edit.html">수정</a>
                <button
                  id="post-delete-button"
                  class="small-button"
                  type="button"
                  data-dialog-open="post-delete-dialog">삭제</button>
              </div>
            </div>
          </div>
        </div>
        <hr />
        <div id="post-images" class="post-images"></div>
        <p id="post-content" class="post-content"></p>

        <div class="stats" aria-label="게시글 통계">
          <button
            id="like-button"
            class="stat-box stat-box--like"
            type="button"
            aria-pressed="false">
            <strong id="like-count" class="stat-box__count" data-post-count="0">0</strong>
            <span class="stat-box__label">좋아요수</span>
          </button><div class="stat-box">
            <strong id="view-count" class="stat-box__count" data-post-count="0">0</strong>
            <span class="stat-box__label">조회수</span>
          </div><div class="stat-box">
            <strong id="comment-count" class="stat-box__count" data-post-count="0">0</strong>
            <span class="stat-box__label">댓글</span>
          </div>
        </div>

        <form id="comment-form" class="comment-form">
          <textarea id="comment-input" placeholder="댓글을 남겨주세요!"></textarea>
          <div class="comment-form__footer">
            <button
              id="comment-submit-button"
              class="btn btn--primary btn--pill"
              type="submit"
              disabled>댓글 등록</button>
          </div>
        </form>

        <div id="comment-list" class="comment-list"></div>
      </article>
    </main>
  </div>

  <dialog
    id="post-delete-dialog"
    class="dialog"
    aria-labelledby="post-delete-title">
    <h2 id="post-delete-title" class="dialog__title">게시글을 삭제하시겠습니까?</h2>
    <p class="dialog__text">삭제한 내용은 복구 할 수 없습니다.</p>
    <div class="dialog__actions">
      <button
        class="btn btn--dark btn--wide btn--rounded"
        type="button"
        value="cancel"
        data-dialog-close>취소</button>
      <button
        id="post-delete-confirm-button"
        class="btn btn--primary btn--wide btn--rounded"
        type="button"
        value="confirm">확인</button>
    </div>
  </dialog>

  <dialog
    id="comment-delete-dialog"
    class="dialog"
    aria-labelledby="comment-delete-title">
    <h2 id="comment-delete-title" class="dialog__title">댓글을 삭제하시겠습니까?</h2>
    <p class="dialog__text">삭제한 내용은 복구 할 수 없습니다.</p>
    <div class="dialog__actions">
      <button
        class="btn btn--dark btn--wide btn--rounded"
        type="button"
        value="cancel"
        data-dialog-close>취소</button>
      <button
        id="comment-delete-confirm-button"
        class="btn btn--primary btn--wide btn--rounded"
        type="button"
        value="confirm">확인</button>
    </div>
  </dialog>

  <script type="module" src="./js/common/header.js"></script>
  <script type="module" src="./js/post-detail.js"></script>
</body>
</html>
