<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원정보수정 | 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/member.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="site-header__inner">
        <div></div>
        <a class="site-header__title" href="./posts.html">아무 말 대잔치</a>
        <nav class="profile-menu" aria-label="프로필 메뉴">
          <button class="icon-button" type="button" aria-label="프로필 메뉴 열기"><span class="avatar"></span></button>
          <div class="profile-menu__panel">
            <a class="profile-menu__item" href="./member-edit.html">회원정보수정</a>
            <a class="profile-menu__item" href="./password-edit.html">비밀번호수정</a>
            <a class="profile-menu__item" href="./sign-in.html">로그아웃</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="main">
      <section class="member-form" aria-labelledby="member-edit-title">
        <h1 id="member-edit-title" class="section-title">회원정보수정</h1>

        <div class="profile-preview">
          <strong class="profile-preview__label required">프로필 사진 *</strong>
          <div class="profile-preview__image" aria-hidden="true"></div>
        </div>

        <form class="form">
          <div class="form-group">
            <span class="label">이메일</span>
            <p class="readonly-text">startupcode@gmail.com</p>
          </div>
          <div class="form-group">
            <label class="label" for="nickname">닉네임</label>
            <input class="input" id="nickname" type="text" placeholder="닉네임을 입력해주세요." />
            <p class="helper">* helper text</p>
          </div>
          <div class="member-actions">
            <button class="btn btn--primary btn--square" type="submit">수정하기</button>
            <button class="btn btn--ghost btn--wide" type="button">회원 탈퇴</button>
          </div>
        </form>

        <div class="member-actions--withdraw">
          <a class="btn btn--primary btn--wide btn--pill" href="#">수정완료</a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
